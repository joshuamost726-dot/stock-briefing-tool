name: Fetch Gov Contracts

on:
  schedule:
    # 10:15pm UTC, Monday-Friday — right after the congress trades fetch,
    # so both Quiver-sourced jobs run back-to-back.
    - cron: '15 22 * * 1-5'
  workflow_dispatch:

jobs:
  fetch-gov-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run gov contracts fetch
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          QUIVER_API_KEY: ${{ secrets.QUIVER_API_KEY }}
        run: python fetch_gov_contracts.py

name: Fetch WSB Mentions

on:
  schedule:
    # 10:45pm UTC, every day (Reddit doesn't observe market hours, unlike
    # the SEC/FINRA-sourced jobs which only run weekdays).
    - cron: '45 22 * * *'
  workflow_dispatch:

jobs:
  fetch-wsb-mentions:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run WSB mentions fetch
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python fetch_wsb_mentions.py

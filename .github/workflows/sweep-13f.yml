name: Sweep 13F

on:
  schedule:
    # 20th of Feb/May/Aug/Nov at 6am UTC — a few days after each quarter's
    # 45-day SEC 13F-HR filing deadline (quarter-end + 45 days), so most
    # funds have filed by the time this runs. sweep_13f.py computes the
    # correct year/quarter from the run date automatically.
    - cron: '0 6 20 2,5,8,11 *'
  workflow_dispatch:   # allows a manual run (e.g. to backfill a different quarter)

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run 13F sweep
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python sweep_13f.py

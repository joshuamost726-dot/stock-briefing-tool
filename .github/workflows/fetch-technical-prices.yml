name: Fetch Technical Prices

on:
  schedule:
    # 9:15pm UTC = 5:15pm ET (just after market close), Monday-Friday only —
    # same window as the other daily yfinance-based fetch jobs.
    - cron: '15 21 * * 1-5'
  workflow_dispatch:

jobs:
  fetch-technical-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run technical price history fetch
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python fetch_technical_prices.py
